[build]
  command = "npm install --prefix server && npm install --prefix client && npm run build --prefix client"
  publish = "client/dist"
  functions = "server/functions"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
